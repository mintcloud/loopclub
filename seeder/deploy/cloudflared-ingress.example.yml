# Cloudflare Tunnel ingress for the loopclub seeder's presence endpoint.
#
# The VPS already runs tunnel "my-vps" (id 736eda62-c751-4cb5-aefe-c3bfe7ba167a)
# as a system service (User=theo), reading ~/.cloudflared/config.yml and serving
# *.tg-itsavibe.com. Add ONE hostname line to that existing file — do NOT create
# a new tunnel. Same pattern as the MCP ingress (mcp.tg-itsavibe.com → 3008).
#
# Why presence.tg-itsavibe.com and not presence.loopclub.xyz:
#   loopclub.xyz DNS is on Vercel (ns*.vercel-dns.com), not Cloudflare, so this
#   tunnel can't bind a loopclub.xyz hostname. presence.tg-itsavibe.com is
#   already a Cloudflare zone → works immediately AND sits behind the Cloudflare
#   edge (WAF + rate-limiting). Set VITE_PRESENCE_URL to this hostname.
#
# Steps:
#   1. cloudflared tunnel route dns my-vps presence.tg-itsavibe.com
#   2. Add the rule below to ~/.cloudflared/config.yml ABOVE the catch-all 404.
#   3. sudo systemctl restart cloudflared

# ── add this block to the existing ingress list ──────────────────────────────
  # loopclub seeder — presence heartbeat collector (POST /beat)
  - hostname: presence.tg-itsavibe.com
    service: http://localhost:3009

  # … keep the existing catch-all LAST:
  # - service: http_status:404
