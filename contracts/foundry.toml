[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
int_types = "long"

[rpc_endpoints]
megaeth_testnet = "${MEGAETH_TESTNET_RPC}"
megaeth_mainnet = "${MEGAETH_MAINNET_RPC}"

[etherscan]
megaeth_testnet = { key = "${MEGAETH_EXPLORER_KEY}", url = "${MEGAETH_TESTNET_EXPLORER_API}" }
