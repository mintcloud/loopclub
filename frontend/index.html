<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>loopclub — on-chain drum machine</title>

      name="description"
      content="One global 16×4 grid drum machine on MegaETH. Rent a cell, jam with everyone live, press the loop as an NFT — co-creators get paid on every press."

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="loopclub" />
    <meta property="og:title" content="loopclub — on-chain drum machine" />
    <meta
      property="og:description"
      content="One global 16×4 grid drum machine on MegaETH. Rent a cell, jam live, press the loop as an NFT — co-creators get paid on every press."
    />
    <meta property="og:image" content="/og-cover.png" />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="loopclub — a 16×4 step grid drum machine" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="loopclub — on-chain drum machine" />
    <meta
      name="twitter:description"
      content="Rent a cell, jam live, press the loop as an NFT — co-creators get paid on every press."
    />
    <meta name="twitter:image" content="/og-cover.png" />

    <!-- NOTE: og:image / twitter:image are relative. Most modern unfurlers (X, Discord,
         Telegram, Slack, Meta) resolve them against the page URL. If a custom domain is
         added, switch these to absolute URLs for maximum crawler coverage, and add
         <meta property="og:url"> + <link rel="canonical">. Per-loop dynamic cards for
         ?loop=N share links would need a Vercel edge function (@vercel/og) — see docs. -->
  </head>
